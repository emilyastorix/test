<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <img id="infoImg" src="./info.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image 
          src="#infoImg"
          position="0 0 0.1"
          width="1"
          height="1.5"
          scale="0.5 0.5 0.5"
          material="opacity: 0"

          animation__fade="property: material.opacity; from: 0; to: 1; dur: 800; easing: easeOutQuad"
          animation__scale="property: scale; from: 0.5 0.5 0.5; to: 1 1 1; dur: 800; easing: easeOutBack">
        </a-image>

      </a-entity>

    </a-scene>
  </body>
</html>
